<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quest Controller → Servo (UDP/WebTransport)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 24px;
    }

    h1  { font-size: 1.4rem; color: #7df3ff; letter-spacing: 1px; }
    h1 small { font-size: 0.7rem; color: #555; margin-left: 6px; }

    #status-bar {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 20px;
      text-align: center;
      width: 100%;
      max-width: 440px;
      font-size: 0.82rem;
    }

    .dot {
      display: inline-block; width: 9px; height: 9px;
      border-radius: 50%; margin-right: 6px; background: #555;
    }
    .dot.green  { background: #4eff91; box-shadow: 0 0 6px #4eff91; }
    .dot.yellow { background: #ffe44e; box-shadow: 0 0 6px #ffe44e; }
    .dot.red    { background: #ff4e4e; box-shadow: 0 0 6px #ff4e4e; }

    .card {
      background: #111827;
      border: 1px solid #2a2a3e;
      border-radius: 12px;
      padding: 14px 18px;
      width: 100%;
      max-width: 440px;
    }
    .card h2 {
      font-size: 0.75rem; color: #666; margin-bottom: 10px;
      text-transform: uppercase; letter-spacing: 1px;
    }

    .servo-row { display: flex; align-items: center; gap: 10px; margin: 5px 0; }
    .servo-label { width: 28px; font-size: 0.78rem; color: #aaa; }
    .servo-track { flex: 1; height: 7px; background: #222; border-radius: 4px; overflow: hidden; }
    .servo-fill {
      height: 100%;
      background: linear-gradient(90deg, #7df3ff, #a78bfa);
      border-radius: 4px; width: 50%;
      transition: width 0.04s linear;
    }
    .servo-val { width: 36px; font-size: 0.82rem; text-align: right; color: #ccc; }

    /* Config grid */
    .cfg-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 10px;
      align-items: center;
      width: 100%;
      max-width: 440px;
      font-size: 0.82rem;
    }
    .cfg-grid label { color: #888; white-space: nowrap; }
    .cfg-grid input {
      background: #1a1a2e; border: 1px solid #333; color: #e0e0e0;
      padding: 5px 9px; border-radius: 6px; width: 100%; font-size: 0.82rem;
    }

    .btn-row { display: flex; gap: 10px; width: 100%; max-width: 440px; }

    .servo-slider {
      flex: 1; height: 26px;
      accent-color: #7df3ff;
      cursor: pointer;
      touch-action: none;   /* keeps the page from scrolling while dragging */
    }

    button {
      flex: 1;
      padding: 11px;
      border-radius: 8px;
      border: 1px solid #555;
      background: #1a1a2e;
      color: #ccc;
      cursor: pointer;
      font-size: 0.88rem;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #252540; }
    button:disabled { opacity: 0.35; cursor: default; }
    button.primary {
      border-color: #7df3ff88; color: #7df3ff;
      background: linear-gradient(135deg, #7df3ff11, #a78bfa11);
    }
    button.primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #7df3ff22, #a78bfa22);
    }

    #stats {
      font-size: 0.7rem; color: #444;
      width: 100%; max-width: 440px;
      display: flex; gap: 16px; justify-content: center;
    }

    #log {
      font-size: 0.7rem; color: #555;
      width: 100%; max-width: 440px;
      max-height: 80px; overflow-y: auto;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <h1>Quest → Servo <small>WebTransport / QUIC</small></h1>

  <!-- ── Config ─────────────────────────────────────── -->
  <div class="cfg-grid">
    <label>Pi IP</label>
    <input id="cfg-ip"   value="172.20.10.9" placeholder="Raspberry Pi LAN IP" />
    <label>Port</label>
    <input id="cfg-port" value="4433"          placeholder="4433" />
    <label>Cert hash (base64)</label>
    <input id="cfg-hash" value="v6P5G/dmmsx0sz27rdK+NAYFt3i6T4KXutCO2j2IQOQ="
           placeholder="Paste from: python setup_cert.py" />
    <label>Send rate (Hz)</label>
    <input id="cfg-hz"   value="60"            placeholder="60" />
    <label>Controller</label>
    <input id="cfg-hand" value="right"         placeholder="right | left" />
  </div>

  <!-- ── Status ─────────────────────────────────────── -->
  <div id="status-bar">
    <span class="dot" id="wt-dot"></span><span id="wt-label">WebTransport: disconnected</span>
    &nbsp;&nbsp;
    <span class="dot" id="xr-dot"></span><span id="xr-label">XR: inactive</span>
  </div>

  <!-- ── Servo bars ─────────────────────────────────── -->
  <div class="card">
    <h2>Live Servo Angles</h2>
    <div class="servo-row">
      <span class="servo-label">S1</span>
      <div class="servo-track"><div class="servo-fill" id="bar-s1"></div></div>
      <span class="servo-val" id="val-s1">90°</span>
    </div>
    <div class="servo-row">
      <span class="servo-label">S2</span>
      <div class="servo-track"><div class="servo-fill" id="bar-s2"></div></div>
      <span class="servo-val" id="val-s2">90°</span>
    </div>
    <div class="servo-row">
      <span class="servo-label">S3</span>

      <span class="servo-label">S4</span>

  <!-- ── Buttons ────────────────────────────────────── -->
  <div class="btn-row">

  </div>

  <div class="btn-row">
    <button id="btn-spin-s1" class="primary" disabled>Spin S1</button>
    <button id="btn-spin-s2" class="primary" disabled>Spin S2</button>
    <button id="btn-spin-s3" class="primary" disabled>Spin S3</button>
  </div>

  <!-- ── Manual sliders (per linkage) ───────────────── -->
  <div class="card">
    <h2>Manual Control</h2>
    <div class="servo-row">
      <span class="servo-label">S1</span>
      <input type="range" class="servo-slider" id="slider-s1" min="0" max="180" value="0" />
      <span class="servo-val" id="slval-s1">0°</span>
    </div>
    <div class="servo-row">
      <span class="servo-label">S2</span>
      <input type="range" class="servo-slider" id="slider-s2" min="5" max="175" value="5" />
      <span class="servo-val" id="slval-s2">5°</span>
    </div>
    <div class="servo-row">
      <span class="servo-label">S3</span>
      <input type="range" class="servo-slider" id="slider-s3" min="5" max="175" value="5" />
      <span class="servo-val" id="slval-s3">5°</span>
    </div>
    <div class="servo-row">
      <span class="servo-label">S4</span>
      <input type="range" class="servo-slider" id="slider-s4" min="5" max="175" value="90" />
      <span class="servo-val" id="slval-s4">90°</span>
    </div>
  </div>

  <!-- ── Stats ─────────────────────────────────────── -->
  <div id="stats">
    <span>Sent: <b id="st-sent">0</b></span>
    <span>Dropped: <b id="st-drop">0</b></span>
    <span>Rate: <b id="st-rate">0</b> Hz</span>
  </div>

  <div id="log"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Logging
// ─────────────────────────────────────────────────────────────────────────────
const logEl = document.getElementById("log");
function log(msg) {
  const d = document.createElement("div");
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.prepend(d);
  while (logEl.children.length > 40) logEl.lastChild.remove();
}

// ─────────────────────────────────────────────────────────────────────────────
// Dot / status helpers
// ─────────────────────────────────────────────────────────────────────────────
const setDot = (id, color, text, labelId) => {
  document.getElementById(id).className = `dot ${color}`;
  document.getElementById(labelId).textContent = text;
};

// ─────────────────────────────────────────────────────────────────────────────
// Servo UI
// ─────────────────────────────────────────────────────────────────────────────
function updateServoUI(s1, s2, s3, s4, strength) {
  const set = (bar, val, a) => {
    document.getElementById(bar).style.width = `${(a / 180) * 100}%`;
    document.getElementById(val).textContent  = `${a}°`;
  };
  set("bar-s1", "val-s1", s1);
  set("bar-s2", "val-s2", s2);
  set("bar-s3", "val-s3", s3);
  set("bar-s4", "val-s4", s4);

  document.getElementById("bar-str").style.width = `${strength * 100}%`;
  document.getElementById("val-str").textContent  = strength.toFixed(2);
  syncSliders(s1, s2, s3, s4);
}

// ─────────────────────────────────────────────────────────────────────────────
// Packet encoding
// Uses compact binary: 5 bytes [s1, s2, s3, s4, strength] — smallest possible datagram
// strength (0-1) is packed into a single byte (0-255)
// ─────────────────────────────────────────────────────────────────────────────
function encodePacket(s1, s2, s3, s4, strength) {
  const str8 = Math.round(clamp(strength, 0, 1) * 255);
  return new Uint8Array([s1 & 0xFF, s2 & 0xFF, s3 & 0xFF, s4 & 0xFF, str8 & 0xFF]);
}

// ─────────────────────────────────────────────────────────────────────────────
// Math
// ─────────────────────────────────────────────────────────────────────────────
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// Analog trigger (0=released, 1=fully pulled) drives S4 down from its 90°
// rest position — fully pulled sends it to 0°.
// Hard safety limits — matches SERVO_LIMITS in webtransport_servo_bridge.py.
// Servos are never driven outside these, no matter what the IK solves for.
//   s1 (base)          — full range, no clamp
//   s2/s3/s4 (joints)  — clamped to ±85° around centre (90°)
const SERVO_LIMITS = {
  s1: [0, 180],
  s2: [5, 175],
  s3: [5, 175],
  s4: [5, 175],
};

const triggerToServo = strength =>
  clamp(Math.round(90 - clamp(strength, 0, 1) * 90), ...SERVO_LIMITS.s4);

// ─────────────────────────────────────────────────────────────────────────────
// Inverse kinematics
//
// Arm model (all servos zeroed = arm pointing straight up):
//   S1  base yaw    — spins the whole arm about the vertical axis
//   S2  shoulder    — tilts link 1 away from vertical
//   S3  elbow       — bends link 2 relative to link 1
// Both links are ~10 in (0.254 m). Calibration assumes your hand is resting
// on the arm's tip (2 links directly above the base) and that you're facing
// the direction the arm tips toward when S1 = 0.
// ─────────────────────────────────────────────────────────────────────────────
const LINK_LEN  = 0.254;                 // metres per link (~10 in)
const MAX_REACH = 2 * LINK_LEN;
const radToDeg  = r => r * (180 / Math.PI);

let ikFrame = null;   // {base:[x,y,z], fwd:[x,z], right:[x,z]} — set at calibration

function calibrateIK(handPos, viewFwdX, viewFwdZ) {
  const n  = Math.hypot(viewFwdX, viewFwdZ) || 1;
  const fx = viewFwdX / n, fz = viewFwdZ / n;
  ikFrame = {
    base:  [handPos.x, handPos.y - MAX_REACH, handPos.z],  // base sits 2 links below the hand
    fwd:   [fx, fz],          // azimuth 0 = headset's horizontal forward at calibration
    right: [-fz, fx],         // 90° clockwise from fwd (viewed from above)
  };
}

function solveIK(hp) {
  const [bx, by, bz] = ikFrame.base;
  const dx = hp.x - bx, dy = hp.y - by, dz = hp.z - bz;

  // Base yaw: horizontal angle of the target, measured from fwd toward right.
  // atan2 returns -180..180 (negative = target is to the left of fwd) — a
  // servo only spans 0..180, so re-centre it: servo 90° = facing fwd,
  // servo 0..90 = swung left, servo 90..180 = swung right. Without this
  // offset, any target left of fwd (negative az) clamps straight to 0 and
  // the base looks "stuck," never swinging that direction at all.
  const azRaw = radToDeg(Math.atan2(
    dx * ikFrame.right[0] + dz * ikFrame.right[1],
    dx * ikFrame.fwd[0]   + dz * ikFrame.fwd[1],
  ));
  const az = 90 + azRaw;

  // 2-link planar solve in the vertical plane through the target.
  // Equal link lengths L: d² = 2L²(1 + cos(bend)) and the straight-line
  // direction to the target bisects the bend, so tilt = φ − bend/2.
  const rHor  = Math.hypot(dx, dz);
  const dRaw  = Math.hypot(rHor, dy);
  const d     = Math.min(dRaw, MAX_REACH);
  const phi   = radToDeg(Math.atan2(rHor, dy));   // target direction, 0 = straight up
  let bend    = radToDeg(Math.acos(clamp(d * d / (2 * LINK_LEN * LINK_LEN) - 1, -1, 1)));
  let tilt    = phi - bend / 2;
  const tiltRaw = tilt;

  // Close-in targets ("inside" the arm) solve to a shoulder angle past its
  // limit. Leaning link 1 back as far as the joint allows is the right move,
  // but the elbow bend computed for the UNCLAMPED shoulder is then stale and
  // the tip lands nowhere near the target. So: pin the shoulder at its limit
  // and re-aim link 2 straight at the target from where the elbow actually is.
  const [s2lo, s2hi] = SERVO_LIMITS.s2;
  if (tilt < s2lo || tilt > s2hi) {
    tilt = clamp(tilt, s2lo, s2hi);
    const a2 = tilt * Math.PI / 180;
    const er = LINK_LEN * Math.sin(a2);   // elbow position, in-plane (r, y)
    const ey = LINK_LEN * Math.cos(a2);
    bend = radToDeg(Math.atan2(rHor - er, dy - ey)) - tilt;
    // Normalize to (-180, 180] — targets that need link 2 folded back past
    // straight-down otherwise wrap to ~-360 and clamp to the WRONG extreme
    bend = ((bend % 360) + 540) % 360 - 180;
  }

  const s1 = Math.round(clamp(az,   ...SERVO_LIMITS.s1));
  const s2 = Math.round(clamp(tilt, ...SERVO_LIMITS.s2));
  const s3 = Math.round(clamp(bend, ...SERVO_LIMITS.s3));

  // Reachable = no clamp had to meaningfully alter the raw solution
  // (tiltRaw, not the pinned tilt — pinning IS a clamp and should show red)
  const T = 2; // tolerance in degrees
  const inLimits = (v, [lo, hi]) => v > lo - T && v < hi + T;
  const reachable =
    dRaw <= MAX_REACH + 0.02 &&
    inLimits(az,      SERVO_LIMITS.s1) &&
    inLimits(tiltRaw, SERVO_LIMITS.s2) &&
    inLimits(bend,    SERVO_LIMITS.s3);

  return { s1, s2, s3, reachable };
}

// Forward kinematics — where the commanded angles put each joint, in world
// space. Used to render the simulated arm so you can see the commanded pose.
function fkPoints(s1, s2, s3) {
  const { base, fwd, right } = ikFrame;
  const a1 = (s1 - 90) * Math.PI / 180;   // undo solveIK's 90°-centred servo mapping
  const a2 = s2 * Math.PI / 180;
  const a3 = (s2 + s3) * Math.PI / 180;   // link 2's absolute angle from vertical
  const dirX = fwd[0] * Math.cos(a1) + right[0] * Math.sin(a1);
  const dirZ = fwd[1] * Math.cos(a1) + right[1] * Math.sin(a1);
  const elbow = [
    base[0] + dirX * LINK_LEN * Math.sin(a2),
    base[1] +        LINK_LEN * Math.cos(a2),
    base[2] + dirZ * LINK_LEN * Math.sin(a2),
  ];
  const tip = [
    elbow[0] + dirX * LINK_LEN * Math.sin(a3),
    elbow[1] +        LINK_LEN * Math.cos(a3),
    elbow[2] + dirZ * LINK_LEN * Math.sin(a3),
  ];
  return { base: [...base], elbow, tip };
}

// ─────────────────────────────────────────────────────────────────────────────
// WebTransport (QUIC datagrams ≈ UDP)
// ─────────────────────────────────────────────────────────────────────────────
let transport    = null;
let datagramWriter = null;
let sentCount    = 0;
let dropCount    = 0;
let rateTimer    = null;
let sentLastSec  = 0;

async function connectWT() {
  const ip   = document.getElementById("cfg-ip").value.trim();
  const port = document.getElementById("cfg-port").value.trim();
  const b64  = document.getElementById("cfg-hash").value.trim();
  const url  = `https://${ip}:${port}/servo`;

  if (!b64) {
    log("ERROR: Cert hash is empty — run  python setup_cert.py  on the Pi first.");
    return;
  }

  // Decode base64 → ArrayBuffer for serverCertificateHashes
  const raw  = atob(b64);
  const buf  = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);

  setDot("wt-dot", "yellow", "WebTransport: connecting…", "wt-label");
  log(`Connecting to ${url} …`);

  try {
    transport = new WebTransport(url, {
      serverCertificateHashes: [{ algorithm: "sha-256", value: buf.buffer }],
      congestionControl: "low-latency",   // hint: prefer low latency over throughput
    });

    await transport.ready;

    setDot("wt-dot", "green", `WebTransport: ${ip}:${port}`, "wt-label");
    log("WebTransport ready (QUIC datagrams active).");

    document.getElementById("btn-connect").disabled    = true;
    document.getElementById("btn-disconnect").disabled = false;
    document.getElementById("btn-enter").disabled      = false;
    document.getElementById("btn-spin-s1").disabled    = false;
    document.getElementById("btn-spin-s2").disabled    = false;
    document.getElementById("btn-spin-s3").disabled    = false;

    // Datagram writer — fire-and-forget, no retransmit
    datagramWriter = transport.datagrams.writable.getWriter();

    transport.closed.then(() => {
      log("WebTransport closed.");
      onDisconnect();
    }).catch(err => {
      log(`WebTransport error: ${err.message}`);
      onDisconnect();
    });

    // Stats update every second
    rateTimer = setInterval(() => {
      document.getElementById("st-rate").textContent = sentLastSec;
      sentLastSec = 0;
    }, 1000);

  } catch (err) {
    log(`Connection failed: ${err.message}`);
    setDot("wt-dot", "red", "WebTransport: failed", "wt-label");
    transport = null;
  }
}

function disconnectWT() {
  if (transport) transport.close();
}

function onDisconnect() {
  transport      = null;
  datagramWriter = null;
  clearInterval(rateTimer);
  setDot("wt-dot", "red", "WebTransport: disconnected", "wt-label");
  document.getElementById("btn-connect").disabled    = false;
  document.getElementById("btn-disconnect").disabled = true;
  document.getElementById("btn-enter").disabled      = true;
  document.getElementById("btn-spin-s1").disabled    = true;
  document.getElementById("btn-spin-s2").disabled    = true;
  document.getElementById("btn-spin-s3").disabled    = true;
}

// ─────────────────────────────────────────────────────────────────────────────
// Per-channel "spin" test buttons — sends a single command byte that tells the
// Pi to sweep that one servo through its range, independent of live tracking.
// ─────────────────────────────────────────────────────────────────────────────
const SPIN_CMD = { s1: 0x02, s2: 0x03, s3: 0x04 };

function spinServo(channel) {
  if (!datagramWriter) {
    log("Not connected — click Connect first.");
    return;
  }
  datagramWriter.write(new Uint8Array([SPIN_CMD[channel]]));
  log(`Sent: spin servo ${channel.toUpperCase()}`);
}

async function sendDatagram(s1, s2, s3, s4, strength) {
  if (!datagramWriter) return;
  try {
    // Non-blocking write — drop if queue is full (true UDP-like behaviour)
    await datagramWriter.write(encodePacket(s1, s2, s3, s4, strength));
    sentCount++;
    sentLastSec++;
    document.getElementById("st-sent").textContent = sentCount;
  } catch (_) {
    dropCount++;
    document.getElementById("st-drop").textContent = dropCount;
  }
}

document.getElementById("btn-connect").addEventListener("click", connectWT);
document.getElementById("btn-disconnect").addEventListener("click", disconnectWT);
document.getElementById("btn-spin-s1").addEventListener("click", () => spinServo("s1"));
document.getElementById("btn-spin-s2").addEventListener("click", () => spinServo("s2"));
document.getElementById("btn-spin-s3").addEventListener("click", () => spinServo("s3"));

// ─────────────────────────────────────────────────────────────────────────────
// Manual sliders — one per linkage. Drive the servos directly when you're NOT
// in AR (bench testing); once an XR session is streaming IK angles, the IK
// overwrites these each frame. S2B has no slider: the bridge mirrors it
// from S2 automatically.
// ─────────────────────────────────────────────────────────────────────────────
let sliderSendPending = null;

function onSliderInput() {
  lastS1 = parseInt(document.getElementById("slider-s1").value);
  lastS2 = parseInt(document.getElementById("slider-s2").value);
  lastS3 = parseInt(document.getElementById("slider-s3").value);
  lastS4 = parseInt(document.getElementById("slider-s4").value);
  updateServoUI(lastS1, lastS2, lastS3, lastS4, lastStrength);
  // Throttle to ~30 Hz, but always deliver the final position
  if (!sliderSendPending) {
    sliderSendPending = setTimeout(() => {
      sliderSendPending = null;
      sendDatagram(lastS1, lastS2, lastS3, lastS4, lastStrength);
    }, 33);
  }
}

function syncSliders(s1, s2, s3, s4) {
  const pairs = [["s1", s1], ["s2", s2], ["s3", s3], ["s4", s4]];
  for (const [key, val] of pairs) {
    document.getElementById(`slider-${key}`).value = val;
    document.getElementById(`slval-${key}`).textContent = `${val}°`;
  }
}

for (const key of ["s1", "s2", "s3", "s4"]) {
  document.getElementById(`slider-${key}`).addEventListener("input", onSliderInput);
}

// ─────────────────────────────────────────────────────────────────────────────
// WebXR session
// ─────────────────────────────────────────────────────────────────────────────
let xrSession  = null;
let xrRefSpace = null;
let lastSendTime = 0;
let xrGL = null;
let lastS1 = 0, lastS2 = 5, lastS3 = 5, lastS4 = 90, lastStrength = 0;
let lastReachable = true;
let prevRecalPressed = false;   // edge detection for the A/X re-calibrate button

// ─────────────────────────────────────────────────────────────────────────────
// In-VR HUD — once inside the headset the page's status bar/servo bars/log
// are invisible, so this draws the same info onto a head-locked quad in front
// of the eye. Otherwise there's no way to tell it's working besides a blank
// clear color.
// ─────────────────────────────────────────────────────────────────────────────
let hud = null;

function compileShader(gl, type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    const info = gl.getShaderInfoLog(sh);
    gl.deleteShader(sh);
    throw new Error(`Shader compile error: ${info}`);
  }
  return sh;
}

function initHud(gl) {
  const vsSrc = `
    attribute vec3 aPos;
    attribute vec2 aUV;
    uniform mat4 uProj;
    varying vec2 vUV;
    void main() {
      gl_Position = uProj * vec4(aPos, 1.0);
      vUV = aUV;
    }
  `;
  const fsSrc = `
    precision mediump float;
    uniform sampler2D uTex;
    varying vec2 vUV;
    void main() {
      gl_FragColor = texture2D(uTex, vUV);
    }
  `;
  const program = gl.createProgram();
  gl.attachShader(program, compileShader(gl, gl.VERTEX_SHADER, vsSrc));
  gl.attachShader(program, compileShader(gl, gl.FRAGMENT_SHADER, fsSrc));
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
    throw new Error(`HUD program link error: ${gl.getProgramInfoLog(program)}`);
  }

  // Head-locked quad tucked in the bottom-right corner of the view, 1.0m in
  // front of the eye, instead of dead center — keeps the passthrough view
  // clear while the readout stays glanceable. Coordinates are given directly
  // in view space (no model/view matrix) so it always faces the camera and
  // stays fixed in the same corner regardless of head pose.
  const verts = new Float32Array([
    // x,     y,     z,    u, v
     0.20, -0.45, -1.0,  0, 1,
     0.55, -0.45, -1.0,  1, 1,
     0.20, -0.20, -1.0,  0, 0,
     0.55, -0.20, -1.0,  1, 0,
  ]);
  const buffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
  gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);

  const canvas = document.createElement("canvas");
  canvas.width = 512; canvas.height = 256;
  const ctx = canvas.getContext("2d");

  const texture = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

  hud = {
    program, buffer, canvas, ctx, texture,
    aPos:  gl.getAttribLocation(program, "aPos"),
    aUV:   gl.getAttribLocation(program, "aUV"),
    uProj: gl.getUniformLocation(program, "uProj"),
    uTex:  gl.getUniformLocation(program, "uTex"),
    lastDraw: 0,
  };
}

function updateHudTexture(gl, s1, s2, s3, s4, strength) {
  const { ctx, canvas, texture } = hud;
  const wtText = document.getElementById("wt-label").textContent;
  const xrText = document.getElementById("xr-label").textContent;

  ctx.fillStyle = "#0d0d14";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "#7df3ff";
  ctx.lineWidth = 4;
  ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);

  ctx.fillStyle = "#7df3ff";
  ctx.font = "bold 26px monospace";
  ctx.fillText("QUEST → SERVO", 20, 40);

  ctx.font = "20px monospace";
  ctx.fillStyle = "#e0e0e0";
  ctx.fillText(wtText, 20, 80);
  ctx.fillText(xrText, 20, 108);
  ctx.fillText(`S1 ${s1}°  S2 ${s2}°  S3 ${s3}°  S4 ${s4}°`, 20, 150);
  ctx.fillText(`STR ${strength.toFixed(2)}`, 20, 178);
  ctx.fillText(`Sent ${sentCount}   Dropped ${dropCount}`, 20, 206);
  if (!ikFrame)            ctx.fillStyle = "#ffe44e";
  else if (lastReachable)  ctx.fillStyle = "#4eff91";
  else                     ctx.fillStyle = "#ff4e4e";
  ctx.fillText(
    !ikFrame ? "IK: waiting for hand pose…"
             : lastReachable ? "IK: target in reach (A = recal)"
                             : "IK: OUT OF REACH — clamping",
    20, 234);

  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, canvas);
}

function drawHud(gl, projectionMatrix) {
  gl.useProgram(hud.program);
  gl.disable(gl.DEPTH_TEST);
  gl.disable(gl.CULL_FACE);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  gl.bindBuffer(gl.ARRAY_BUFFER, hud.buffer);
  gl.enableVertexAttribArray(hud.aPos);
  gl.vertexAttribPointer(hud.aPos, 3, gl.FLOAT, false, 20, 0);
  gl.enableVertexAttribArray(hud.aUV);
  gl.vertexAttribPointer(hud.aUV, 2, gl.FLOAT, false, 20, 12);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, hud.texture);
  gl.uniform1i(hud.uTex, 0);
  gl.uniformMatrix4fv(hud.uProj, false, projectionMatrix);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ─────────────────────────────────────────────────────────────────────────────
// Simulated arm — world-anchored render of the COMMANDED pose (what the servos
// were just told to do), drawn as lines at the calibrated base position, plus
// a cross marking the raw hand target. If the arm and the cross drift apart,
// the target is outside the reachable envelope and the IK is clamping.
// ─────────────────────────────────────────────────────────────────────────────
let armViz = null;

function initArmViz(gl) {
  const vsSrc = `
    attribute vec3 aPos;
    uniform mat4 uProj;
    uniform mat4 uView;
    void main() {
      gl_Position = uProj * uView * vec4(aPos, 1.0);
      gl_PointSize = 12.0;
    }
  `;
  const fsSrc = `
    precision mediump float;
    uniform vec4 uColor;
    void main() { gl_FragColor = uColor; }
  `;
  const program = gl.createProgram();
  gl.attachShader(program, compileShader(gl, gl.VERTEX_SHADER, vsSrc));
  gl.attachShader(program, compileShader(gl, gl.FRAGMENT_SHADER, fsSrc));
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
    throw new Error(`Arm viz program link error: ${gl.getProgramInfoLog(program)}`);
  }
  armViz = {
    program,
    buffer: gl.createBuffer(),
    aPos:   gl.getAttribLocation(program, "aPos"),
    uProj:  gl.getUniformLocation(program, "uProj"),
    uView:  gl.getUniformLocation(program, "uView"),
    uColor: gl.getUniformLocation(program, "uColor"),
  };
}

function _drawVerts(gl, verts, mode, r, g, b, a) {
  gl.bindBuffer(gl.ARRAY_BUFFER, armViz.buffer);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(verts), gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(armViz.aPos);
  gl.vertexAttribPointer(armViz.aPos, 3, gl.FLOAT, false, 0, 0);
  gl.uniform4f(armViz.uColor, r, g, b, a);
  gl.drawArrays(mode, 0, verts.length / 3);
}

function drawArm(gl, projectionMatrix, viewMatrix, pts, target, reachable) {
  gl.useProgram(armViz.program);
  gl.disable(gl.DEPTH_TEST);
  gl.disable(gl.CULL_FACE);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  gl.uniformMatrix4fv(armViz.uProj, false, projectionMatrix);
  gl.uniformMatrix4fv(armViz.uView, false, viewMatrix);

  // Links: base → elbow → tip (cyan), joints as dots (purple)
  _drawVerts(gl, [...pts.base, ...pts.elbow, ...pts.elbow, ...pts.tip],
             gl.LINES, 0.49, 0.95, 1.0, 1.0);
  _drawVerts(gl, [...pts.base, ...pts.elbow, ...pts.tip],
             gl.POINTS, 0.65, 0.55, 0.98, 1.0);

  // Hand-target cross — green when reachable, red when the IK is clamping
  if (target) {
    const c = 0.03, [x, y, z] = [target.x, target.y, target.z];
    const cross = [x-c,y,z, x+c,y,z,  x,y-c,z, x,y+c,z,  x,y,z-c, x,y,z+c];
    if (reachable) _drawVerts(gl, cross, gl.LINES, 0.31, 1.0, 0.57, 1.0);
    else           _drawVerts(gl, cross, gl.LINES, 1.0, 0.31, 0.31, 1.0);
  }
}

const btnEnter = document.getElementById("btn-enter");

btnEnter.addEventListener("click", async () => {
  if (!navigator.xr) {
    log("WebXR not available — use the Meta Quest Browser.");
    return;
  }
  try {
    // Prep the WebGL context BEFORE requesting the session so it's already
    // XR-compatible the instant the session exists — the headset's "entering
    // VR" transition starts as soon as requestSession() resolves, and every
    // ms spent on setup after that is a ms with no frames being submitted.
    const canvas = document.createElement("canvas");
    xrGL = canvas.getContext("webgl", { xrCompatible: true, alpha: true });
    await xrGL.makeXRCompatible();
    initHud(xrGL);
    initArmViz(xrGL);

    // "immersive-ar" is what gives passthrough (see-through camera) on Quest —
    // "immersive-vr" is always opaque. Fall back to VR if AR isn't supported.
    try {
      xrSession = await navigator.xr.requestSession("immersive-ar", {
        optionalFeatures: ["local-floor"],
      });
      log("Passthrough AR session requested.");
    } catch (arErr) {
      log("Passthrough AR unavailable, falling back to opaque VR.");
      xrSession = await navigator.xr.requestSession("immersive-vr", {
        optionalFeatures: ["local-floor"],
      });
    }

    // A WebXR session must have a render layer or the headset compositor
    // has nothing to display and hangs on the "entering VR" transition.
    xrSession.updateRenderState({
      baseLayer: new XRWebGLLayer(xrSession, xrGL),
    });

    xrRefSpace = await xrSession.requestReferenceSpace("local-floor").catch(
      () => xrSession.requestReferenceSpace("local")
    );

    setDot("xr-dot", "green", "XR: active", "xr-label");
    btnEnter.disabled = true;
    log("XR session started.");

    xrSession.addEventListener("end", () => {
      setDot("xr-dot", "red", "XR: ended", "xr-label");
      btnEnter.disabled = false;
      xrSession = null; xrRefSpace = null; xrGL = null; hud = null;
      armViz = null; ikFrame = null;   // force a fresh calibration next session
      log("XR session ended.");
    });

    xrSession.requestAnimationFrame(onXRFrame);
  } catch (err) {
    log(`XR error: ${err.message}`);
    setDot("xr-dot", "red", "XR: failed", "xr-label");
    // If requestSession() already resolved, the headset has started its VR
    // transition — without ending the session here it hangs on that loading
    // screen forever, hiding the very error we just logged.
    if (xrSession) {
      xrSession.end().catch(() => {});
      xrSession = null;
    }
  }
});

function onXRFrame(time, frame) {
  if (!xrSession) return;
  xrSession.requestAnimationFrame(onXRFrame);

  // Submit an (empty, cleared) frame — required for the compositor to
  // treat the session as actively rendering rather than stalled.
  const layer = frame.session.renderState.baseLayer;
  xrGL.bindFramebuffer(xrGL.FRAMEBUFFER, layer.framebuffer);
  // Fully transparent clear — in "immersive-ar" mode this lets the real-world
  // passthrough camera show through everywhere except the HUD panel itself.
  // (In the opaque "immersive-vr" fallback, alpha is ignored and this just
  // renders black, same as before.)
  xrGL.clearColor(0.0, 0.0, 0.0, 0.0);
  xrGL.clear(xrGL.COLOR_BUFFER_BIT | xrGL.DEPTH_BUFFER_BIT);

  const hand   = document.getElementById("cfg-hand").value.trim() || "right";
  const hz     = Math.max(1, Math.min(120, parseInt(document.getElementById("cfg-hz").value) || 60));
  const minGap = 1000 / hz;

  const src  = Array.from(frame.session.inputSources).find(s => s.handedness === hand);
  const pose = src?.gripSpace ? frame.getPose(src.gripSpace, xrRefSpace) : null;

  // Strength is always read from the right controller's trigger (button 0),
  // independent of which hand drives the angles via "Controller" above.
  const rightSrc = Array.from(frame.session.inputSources).find(s => s.handedness === "right");
  const trigger   = rightSrc?.gamepad?.buttons?.[0];
  lastStrength    = trigger ? clamp(trigger.value, 0, 1) : 0;
  lastS4          = triggerToServo(lastStrength);

  const viewerPose = frame.getViewerPose(xrRefSpace);
  const handPos    = pose ? pose.transform.position : null;

  // Calibrate on the first tracked hand pose — hold your hand on the arm's
  // tip (arm zeroed, straight up) facing the arm's S1=0 tip-over direction.
  // Press A (or X on left controller) any time to re-calibrate.
  const recalPressed = src?.gamepad?.buttons?.[4]?.pressed || false;
  if (handPos && viewerPose && (!ikFrame || (recalPressed && !prevRecalPressed))) {
    // Column-major pose matrix: forward = -Z axis = -(m[8], m[9], m[10])
    const m = viewerPose.transform.matrix;
    calibrateIK(handPos, -m[8], -m[10]);
    log(`IK calibrated — base assumed ${MAX_REACH.toFixed(2)}m below hand, facing your forward.`);
  }
  prevRecalPressed = recalPressed;

  // IK: solve joint angles so the arm's tip chases the hand's position
  // relative to the calibrated base. No pose this frame → hold last angles.
  if (handPos && ikFrame) {
    const ik = solveIK(handPos);
    lastS1 = ik.s1; lastS2 = ik.s2; lastS3 = ik.s3;
    lastReachable = ik.reachable;
  }

  updateServoUI(lastS1, lastS2, lastS3, lastS4, lastStrength);

  if (time - lastSendTime >= minGap) {
    sendDatagram(lastS1, lastS2, lastS3, lastS4, lastStrength);   // fire-and-forget datagram
    lastSendTime = time;
  }

  // Render the HUD every frame regardless of controller tracking, so you can
  // always see connection/tracking status from inside the headset — a
  // missing controller pose should show up as "stuck at last value" on the
  // HUD, not as a dark, silent screen.
  if (viewerPose && hud) {
    if (time - hud.lastDraw > 150) {
      updateHudTexture(xrGL, lastS1, lastS2, lastS3, lastS4, lastStrength);
      hud.lastDraw = time;
    }
    const armPts = (ikFrame && armViz) ? fkPoints(lastS1, lastS2, lastS3) : null;
    for (const view of viewerPose.views) {
      const vp = layer.getViewport(view);
      xrGL.viewport(vp.x, vp.y, vp.width, vp.height);
      drawHud(xrGL, view.projectionMatrix);
      if (armPts) {
        drawArm(xrGL, view.projectionMatrix, view.transform.inverse.matrix,
                armPts, handPos, lastReachable);
      }
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Boot check
// ─────────────────────────────────────────────────────────────────────────────
window.addEventListener("load", async () => {
  if (typeof WebTransport === "undefined") {
    log("WebTransport API not found. Use Meta Quest Browser (v50+).");
    document.getElementById("btn-connect").disabled = true;
    return;
  }
  log("WebTransport API available.");

  if (!navigator.xr) {
    log("WebXR not available on this browser.");
    return;
  }
  const arOk = await navigator.xr.isSessionSupported("immersive-ar");
  const vrOk = await navigator.xr.isSessionSupported("immersive-vr");
  log(arOk ? "Passthrough AR supported — ready." :
      vrOk ? "Immersive VR supported (no passthrough on this device)." :
      "No immersive XR mode supported.");
});
</script>
</body>
</html>
