<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quest Controller → Servo (UDP/WebTransport)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 24px;
    }

    h1  { font-size: 1.4rem; color: #7df3ff; letter-spacing: 1px; }
    h1 small { font-size: 0.7rem; color: #555; margin-left: 6px; }

    #status-bar {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 20px;
      text-align: center;
      width: 100%;
      max-width: 440px;
      font-size: 0.82rem;
    }

    .dot {
      display: inline-block; width: 9px; height: 9px;
      border-radius: 50%; margin-right: 6px; background: #555;
    }
    .dot.green  { background: #4eff91; box-shadow: 0 0 6px #4eff91; }
    .dot.yellow { background: #ffe44e; box-shadow: 0 0 6px #ffe44e; }
    .dot.red    { background: #ff4e4e; box-shadow: 0 0 6px #ff4e4e; }

    .card {
      background: #111827;
      border: 1px solid #2a2a3e;
      border-radius: 12px;
      padding: 14px 18px;
      width: 100%;
      max-width: 440px;
    }
    .card h2 {
      font-size: 0.75rem; color: #666; margin-bottom: 10px;
      text-transform: uppercase; letter-spacing: 1px;
    }

    .servo-row { display: flex; align-items: center; gap: 10px; margin: 5px 0; }
    .servo-label { width: 28px; font-size: 0.78rem; color: #aaa; }
    .servo-track { flex: 1; height: 7px; background: #222; border-radius: 4px; overflow: hidden; }
    .servo-fill {
      height: 100%;
      background: linear-gradient(90deg, #7df3ff, #a78bfa);
      border-radius: 4px; width: 50%;
      transition: width 0.04s linear;
    }
    .servo-val { width: 36px; font-size: 0.82rem; text-align: right; color: #ccc; }

    /* Config grid */
    .cfg-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 10px;
      align-items: center;
      width: 100%;
      max-width: 440px;
      font-size: 0.82rem;
    }
    .cfg-grid label { color: #888; white-space: nowrap; }
    .cfg-grid input {
      background: #1a1a2e; border: 1px solid #333; color: #e0e0e0;
      padding: 5px 9px; border-radius: 6px; width: 100%; font-size: 0.82rem;
    }

    .btn-row { display: flex; gap: 10px; width: 100%; max-width: 440px; }

    button {
      flex: 1;
      padding: 11px;
      border-radius: 8px;
      border: 1px solid #555;
      background: #1a1a2e;
      color: #ccc;
      cursor: pointer;
      font-size: 0.88rem;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #252540; }
    button:disabled { opacity: 0.35; cursor: default; }
    button.primary {
      border-color: #7df3ff88; color: #7df3ff;
      background: linear-gradient(135deg, #7df3ff11, #a78bfa11);
    }
    button.primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #7df3ff22, #a78bfa22);
    }

    #stats {
      font-size: 0.7rem; color: #444;
      width: 100%; max-width: 440px;
      display: flex; gap: 16px; justify-content: center;
    }

    #log {
      font-size: 0.7rem; color: #555;
      width: 100%; max-width: 440px;
      max-height: 80px; overflow-y: auto;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <h1>Quest → Servo <small>WebTransport / QUIC</small></h1>

  <!-- ── Config ─────────────────────────────────────── -->
  <div class="cfg-grid">
    <label>Pi IP</label>
    <input id="cfg-ip"   value="172.20.10.7" placeholder="Raspberry Pi LAN IP" />
    <label>Port</label>
    <input id="cfg-port" value="4433"          placeholder="4433" />
    <label>Cert hash (base64)</label>
    <input id="cfg-hash" value="NtudMkkERYKhVJcwg428GRSGNX+10IlK9QGzoPLfesE="
           placeholder="Paste from: python setup_cert.py" />
    <label>Send rate (Hz)</label>
    <input id="cfg-hz"   value="60"            placeholder="60" />
    <label>Controller</label>
    <input id="cfg-hand" value="right"         placeholder="right | left" />
  </div>

  <!-- ── Status ─────────────────────────────────────── -->
  <div id="status-bar">
    <span class="dot" id="wt-dot"></span><span id="wt-label">WebTransport: disconnected</span>
    &nbsp;&nbsp;
    <span class="dot" id="xr-dot"></span><span id="xr-label">XR: inactive</span>
  </div>

  <!-- ── Servo bars ─────────────────────────────────── -->
  <div class="card">
    <h2>Live Servo Angles</h2>
    <div class="servo-row">
      <span class="servo-label">S1</span>
      <div class="servo-track"><div class="servo-fill" id="bar-s1"></div></div>
      <span class="servo-val" id="val-s1">90°</span>
    </div>
    <div class="servo-row">
      <span class="servo-label">S2</span>
      <div class="servo-track"><div class="servo-fill" id="bar-s2"></div></div>
      <span class="servo-val" id="val-s2">90°</span>
    </div>
    <div class="servo-row">
      <span class="servo-label">S3</span>
      <div class="servo-track"><div class="servo-fill" id="bar-s3"></div></div>
      <span class="servo-val" id="val-s3">90°</span>
    </div>
    <div class="servo-row">
      <span class="servo-label">STR</span>
      <div class="servo-track"><div class="servo-fill" id="bar-str"></div></div>
      <span class="servo-val" id="val-str">0.00</span>
    </div>
  </div>

  <!-- ── Buttons ────────────────────────────────────── -->
  <div class="btn-row">
    <button id="btn-connect" class="primary">Connect</button>
    <button id="btn-enter"   class="primary" disabled>Enter AR</button>
    <button id="btn-disconnect" disabled>Disconnect</button>
  </div>

  <div class="btn-row">
    <button id="btn-spin-s1" class="primary" disabled>Spin S1</button>
    <button id="btn-spin-s2" class="primary" disabled>Spin S2</button>
    <button id="btn-spin-s3" class="primary" disabled>Spin S3</button>
  </div>

  <!-- ── Stats ─────────────────────────────────────── -->
  <div id="stats">
    <span>Sent: <b id="st-sent">0</b></span>
    <span>Dropped: <b id="st-drop">0</b></span>
    <span>Rate: <b id="st-rate">0</b> Hz</span>
  </div>

  <div id="log"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Logging
// ─────────────────────────────────────────────────────────────────────────────
const logEl = document.getElementById("log");
function log(msg) {
  const d = document.createElement("div");
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.prepend(d);
  while (logEl.children.length > 40) logEl.lastChild.remove();
}

// ─────────────────────────────────────────────────────────────────────────────
// Dot / status helpers
// ─────────────────────────────────────────────────────────────────────────────
const setDot = (id, color, text, labelId) => {
  document.getElementById(id).className = `dot ${color}`;
  document.getElementById(labelId).textContent = text;
};

// ─────────────────────────────────────────────────────────────────────────────
// Servo UI
// ─────────────────────────────────────────────────────────────────────────────
function updateServoUI(s1, s2, s3, strength) {
  const set = (bar, val, a) => {
    document.getElementById(bar).style.width = `${(a / 180) * 100}%`;
    document.getElementById(val).textContent  = `${a}°`;
  };
  set("bar-s1", "val-s1", s1);
  set("bar-s2", "val-s2", s2);
  set("bar-s3", "val-s3", s3);

  document.getElementById("bar-str").style.width = `${strength * 100}%`;
  document.getElementById("val-str").textContent  = strength.toFixed(2);
}

// ─────────────────────────────────────────────────────────────────────────────
// Packet encoding
// Uses compact binary: 4 bytes [s1, s2, s3, strength] — smallest possible datagram
// strength (0-1) is packed into a single byte (0-255)
// ─────────────────────────────────────────────────────────────────────────────
function encodePacket(s1, s2, s3, strength) {
  const str8 = Math.round(clamp(strength, 0, 1) * 255);
  return new Uint8Array([s1 & 0xFF, s2 & 0xFF, s3 & 0xFF, str8 & 0xFF]);
}

// ─────────────────────────────────────────────────────────────────────────────
// Math
// ─────────────────────────────────────────────────────────────────────────────
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function quatToEulerDeg(q) {
  const { x, y, z, w } = q;
  const roll  = Math.atan2(2*(w*x + y*z), 1 - 2*(x*x + y*y));
  const sinp  = 2*(w*y - z*x);
  const pitch = Math.abs(sinp) >= 1 ? Math.sign(sinp)*Math.PI/2 : Math.asin(sinp);
  const yaw   = Math.atan2(2*(w*z + x*y), 1 - 2*(y*y + z*z));
  const d     = r => r * (180 / Math.PI);
  return [d(yaw), d(pitch), d(roll)];
}

// Gain > 1 means a smaller hand rotation now sweeps the full 0-180 range —
// i.e. more sensitive than the original 1:1 (±180°/±90°) mapping.
const YAW_GAIN   = 2.5;
const PITCH_GAIN = 2.5;
const yawToServo   = deg => clamp(Math.round(90 + deg * YAW_GAIN), 0, 180);
const pitchToServo = deg => clamp(Math.round(90 + deg * PITCH_GAIN), 0, 180);

// ─────────────────────────────────────────────────────────────────────────────
// WebTransport (QUIC datagrams ≈ UDP)
// ─────────────────────────────────────────────────────────────────────────────
let transport    = null;
let datagramWriter = null;
let sentCount    = 0;
let dropCount    = 0;
let rateTimer    = null;
let sentLastSec  = 0;

async function connectWT() {
  const ip   = document.getElementById("cfg-ip").value.trim();
  const port = document.getElementById("cfg-port").value.trim();
  const b64  = document.getElementById("cfg-hash").value.trim();
  const url  = `https://${ip}:${port}/servo`;

  if (!b64) {
    log("ERROR: Cert hash is empty — run  python setup_cert.py  on the Pi first.");
    return;
  }

  // Decode base64 → ArrayBuffer for serverCertificateHashes
  const raw  = atob(b64);
  const buf  = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);

  setDot("wt-dot", "yellow", "WebTransport: connecting…", "wt-label");
  log(`Connecting to ${url} …`);

  try {
    transport = new WebTransport(url, {
      serverCertificateHashes: [{ algorithm: "sha-256", value: buf.buffer }],
      congestionControl: "low-latency",   // hint: prefer low latency over throughput
    });

    await transport.ready;

    setDot("wt-dot", "green", `WebTransport: ${ip}:${port}`, "wt-label");
    log("WebTransport ready (QUIC datagrams active).");

    document.getElementById("btn-connect").disabled    = true;
    document.getElementById("btn-disconnect").disabled = false;
    document.getElementById("btn-enter").disabled      = false;
    document.getElementById("btn-spin-s1").disabled    = false;
    document.getElementById("btn-spin-s2").disabled    = false;
    document.getElementById("btn-spin-s3").disabled    = false;

    // Datagram writer — fire-and-forget, no retransmit
    datagramWriter = transport.datagrams.writable.getWriter();

    transport.closed.then(() => {
      log("WebTransport closed.");
      onDisconnect();
    }).catch(err => {
      log(`WebTransport error: ${err.message}`);
      onDisconnect();
    });

    // Stats update every second
    rateTimer = setInterval(() => {
      document.getElementById("st-rate").textContent = sentLastSec;
      sentLastSec = 0;
    }, 1000);

  } catch (err) {
    log(`Connection failed: ${err.message}`);
    setDot("wt-dot", "red", "WebTransport: failed", "wt-label");
    transport = null;
  }
}

function disconnectWT() {
  if (transport) transport.close();
}

function onDisconnect() {
  transport      = null;
  datagramWriter = null;
  clearInterval(rateTimer);
  setDot("wt-dot", "red", "WebTransport: disconnected", "wt-label");
  document.getElementById("btn-connect").disabled    = false;
  document.getElementById("btn-disconnect").disabled = true;
  document.getElementById("btn-enter").disabled      = true;
  document.getElementById("btn-spin-s1").disabled    = true;
  document.getElementById("btn-spin-s2").disabled    = true;
  document.getElementById("btn-spin-s3").disabled    = true;
}

// ─────────────────────────────────────────────────────────────────────────────
// Per-channel "spin" test buttons — sends a single command byte that tells the
// Pi to sweep that one servo through its range, independent of live tracking.
// ─────────────────────────────────────────────────────────────────────────────
const SPIN_CMD = { s1: 0x02, s2: 0x03, s3: 0x04 };

function spinServo(channel) {
  if (!datagramWriter) {
    log("Not connected — click Connect first.");
    return;
  }
  datagramWriter.write(new Uint8Array([SPIN_CMD[channel]]));
  log(`Sent: spin servo ${channel.toUpperCase()}`);
}

async function sendDatagram(s1, s2, s3, strength) {
  if (!datagramWriter) return;
  try {
    // Non-blocking write — drop if queue is full (true UDP-like behaviour)
    await datagramWriter.write(encodePacket(s1, s2, s3, strength));
    sentCount++;
    sentLastSec++;
    document.getElementById("st-sent").textContent = sentCount;
  } catch (_) {
    dropCount++;
    document.getElementById("st-drop").textContent = dropCount;
  }
}

document.getElementById("btn-connect").addEventListener("click", connectWT);
document.getElementById("btn-disconnect").addEventListener("click", disconnectWT);
document.getElementById("btn-spin-s1").addEventListener("click", () => spinServo("s1"));
document.getElementById("btn-spin-s2").addEventListener("click", () => spinServo("s2"));
document.getElementById("btn-spin-s3").addEventListener("click", () => spinServo("s3"));

// ─────────────────────────────────────────────────────────────────────────────
// WebXR session
// ─────────────────────────────────────────────────────────────────────────────
let xrSession  = null;
let xrRefSpace = null;
let lastSendTime = 0;
let xrGL = null;
let lastS1 = 90, lastS2 = 90, lastS3 = 90, lastStrength = 0;

// ─────────────────────────────────────────────────────────────────────────────
// In-VR HUD — once inside the headset the page's status bar/servo bars/log
// are invisible, so this draws the same info onto a head-locked quad in front
// of the eye. Otherwise there's no way to tell it's working besides a blank
// clear color.
// ─────────────────────────────────────────────────────────────────────────────
let hud = null;

function compileShader(gl, type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    const info = gl.getShaderInfoLog(sh);
    gl.deleteShader(sh);
    throw new Error(`Shader compile error: ${info}`);
  }
  return sh;
}

function initHud(gl) {
  const vsSrc = `
    attribute vec3 aPos;
    attribute vec2 aUV;
    uniform mat4 uProj;
    varying vec2 vUV;
    void main() {
      gl_Position = uProj * vec4(aPos, 1.0);
      vUV = aUV;
    }
  `;
  const fsSrc = `
    precision mediump float;
    uniform sampler2D uTex;
    varying vec2 vUV;
    void main() {
      gl_FragColor = texture2D(uTex, vUV);
    }
  `;
  const program = gl.createProgram();
  gl.attachShader(program, compileShader(gl, gl.VERTEX_SHADER, vsSrc));
  gl.attachShader(program, compileShader(gl, gl.FRAGMENT_SHADER, fsSrc));
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
    throw new Error(`HUD program link error: ${gl.getProgramInfoLog(program)}`);
  }

  // Head-locked quad tucked in the bottom-right corner of the view, 1.0m in
  // front of the eye, instead of dead center — keeps the passthrough view
  // clear while the readout stays glanceable. Coordinates are given directly
  // in view space (no model/view matrix) so it always faces the camera and
  // stays fixed in the same corner regardless of head pose.
  const verts = new Float32Array([
    // x,     y,     z,    u, v
     0.20, -0.45, -1.0,  0, 1,
     0.55, -0.45, -1.0,  1, 1,
     0.20, -0.20, -1.0,  0, 0,
     0.55, -0.20, -1.0,  1, 0,
  ]);
  const buffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
  gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);

  const canvas = document.createElement("canvas");
  canvas.width = 512; canvas.height = 256;
  const ctx = canvas.getContext("2d");

  const texture = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

  hud = {
    program, buffer, canvas, ctx, texture,
    aPos:  gl.getAttribLocation(program, "aPos"),
    aUV:   gl.getAttribLocation(program, "aUV"),
    uProj: gl.getUniformLocation(program, "uProj"),
    uTex:  gl.getUniformLocation(program, "uTex"),
    lastDraw: 0,
  };
}

function updateHudTexture(gl, s1, s2, s3, strength) {
  const { ctx, canvas, texture } = hud;
  const wtText = document.getElementById("wt-label").textContent;
  const xrText = document.getElementById("xr-label").textContent;

  ctx.fillStyle = "#0d0d14";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "#7df3ff";
  ctx.lineWidth = 4;
  ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);

  ctx.fillStyle = "#7df3ff";
  ctx.font = "bold 26px monospace";
  ctx.fillText("QUEST → SERVO", 20, 40);

  ctx.font = "20px monospace";
  ctx.fillStyle = "#e0e0e0";
  ctx.fillText(wtText, 20, 80);
  ctx.fillText(xrText, 20, 108);
  ctx.fillText(`S1 ${s1}°  S2 ${s2}°  S3 ${s3}°`, 20, 150);
  ctx.fillText(`STR ${strength.toFixed(2)}`, 20, 178);
  ctx.fillText(`Sent ${sentCount}   Dropped ${dropCount}`, 20, 206);

  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, canvas);
}

function drawHud(gl, projectionMatrix) {
  gl.useProgram(hud.program);
  gl.disable(gl.DEPTH_TEST);
  gl.disable(gl.CULL_FACE);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  gl.bindBuffer(gl.ARRAY_BUFFER, hud.buffer);
  gl.enableVertexAttribArray(hud.aPos);
  gl.vertexAttribPointer(hud.aPos, 3, gl.FLOAT, false, 20, 0);
  gl.enableVertexAttribArray(hud.aUV);
  gl.vertexAttribPointer(hud.aUV, 2, gl.FLOAT, false, 20, 12);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, hud.texture);
  gl.uniform1i(hud.uTex, 0);
  gl.uniformMatrix4fv(hud.uProj, false, projectionMatrix);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

const btnEnter = document.getElementById("btn-enter");

btnEnter.addEventListener("click", async () => {
  if (!navigator.xr) {
    log("WebXR not available — use the Meta Quest Browser.");
    return;
  }
  try {
    // Prep the WebGL context BEFORE requesting the session so it's already
    // XR-compatible the instant the session exists — the headset's "entering
    // VR" transition starts as soon as requestSession() resolves, and every
    // ms spent on setup after that is a ms with no frames being submitted.
    const canvas = document.createElement("canvas");
    xrGL = canvas.getContext("webgl", { xrCompatible: true, alpha: true });
    await xrGL.makeXRCompatible();
    initHud(xrGL);

    // "immersive-ar" is what gives passthrough (see-through camera) on Quest —
    // "immersive-vr" is always opaque. Fall back to VR if AR isn't supported.
    try {
      xrSession = await navigator.xr.requestSession("immersive-ar", {
        optionalFeatures: ["local-floor"],
      });
      log("Passthrough AR session requested.");
    } catch (arErr) {
      log("Passthrough AR unavailable, falling back to opaque VR.");
      xrSession = await navigator.xr.requestSession("immersive-vr", {
        optionalFeatures: ["local-floor"],
      });
    }

    // A WebXR session must have a render layer or the headset compositor
    // has nothing to display and hangs on the "entering VR" transition.
    xrSession.updateRenderState({
      baseLayer: new XRWebGLLayer(xrSession, xrGL),
    });

    xrRefSpace = await xrSession.requestReferenceSpace("local-floor").catch(
      () => xrSession.requestReferenceSpace("local")
    );

    setDot("xr-dot", "green", "XR: active", "xr-label");
    btnEnter.disabled = true;
    log("XR session started.");

    xrSession.addEventListener("end", () => {
      setDot("xr-dot", "red", "XR: ended", "xr-label");
      btnEnter.disabled = false;
      xrSession = null; xrRefSpace = null; xrGL = null; hud = null;
      log("XR session ended.");
    });

    xrSession.requestAnimationFrame(onXRFrame);
  } catch (err) {
    log(`XR error: ${err.message}`);
    setDot("xr-dot", "red", "XR: failed", "xr-label");
    // If requestSession() already resolved, the headset has started its VR
    // transition — without ending the session here it hangs on that loading
    // screen forever, hiding the very error we just logged.
    if (xrSession) {
      xrSession.end().catch(() => {});
      xrSession = null;
    }
  }
});

function onXRFrame(time, frame) {
  if (!xrSession) return;
  xrSession.requestAnimationFrame(onXRFrame);

  // Submit an (empty, cleared) frame — required for the compositor to
  // treat the session as actively rendering rather than stalled.
  const layer = frame.session.renderState.baseLayer;
  xrGL.bindFramebuffer(xrGL.FRAMEBUFFER, layer.framebuffer);
  // Fully transparent clear — in "immersive-ar" mode this lets the real-world
  // passthrough camera show through everywhere except the HUD panel itself.
  // (In the opaque "immersive-vr" fallback, alpha is ignored and this just
  // renders black, same as before.)
  xrGL.clearColor(0.0, 0.0, 0.0, 0.0);
  xrGL.clear(xrGL.COLOR_BUFFER_BIT | xrGL.DEPTH_BUFFER_BIT);

  const hand   = document.getElementById("cfg-hand").value.trim() || "right";
  const hz     = Math.max(1, Math.min(120, parseInt(document.getElementById("cfg-hz").value) || 60));
  const minGap = 1000 / hz;

  const src  = Array.from(frame.session.inputSources).find(s => s.handedness === hand);
  const pose = src?.gripSpace ? frame.getPose(src.gripSpace, xrRefSpace) : null;

  // Strength is always read from the right controller's trigger (button 0),
  // independent of which hand drives the angles via "Controller" above.
  const rightSrc = Array.from(frame.session.inputSources).find(s => s.handedness === "right");
  const trigger   = rightSrc?.gamepad?.buttons?.[0];
  lastStrength    = trigger ? clamp(trigger.value, 0, 1) : 0;

  if (pose) {
    const [yaw, pitch, roll] = quatToEulerDeg(pose.transform.orientation);
    lastS1 = yawToServo(yaw);
    lastS2 = pitchToServo(pitch);
    lastS3 = yawToServo(roll);
  }

  updateServoUI(lastS1, lastS2, lastS3, lastStrength);

  if (time - lastSendTime >= minGap) {
    sendDatagram(lastS1, lastS2, lastS3, lastStrength);   // fire-and-forget datagram
    lastSendTime = time;
  }

  // Render the HUD every frame regardless of controller tracking, so you can
  // always see connection/tracking status from inside the headset — a
  // missing controller pose should show up as "stuck at last value" on the
  // HUD, not as a dark, silent screen.
  const viewerPose = frame.getViewerPose(xrRefSpace);
  if (viewerPose && hud) {
    if (time - hud.lastDraw > 150) {
      updateHudTexture(xrGL, lastS1, lastS2, lastS3, lastStrength);
      hud.lastDraw = time;
    }
    for (const view of viewerPose.views) {
      const vp = layer.getViewport(view);
      xrGL.viewport(vp.x, vp.y, vp.width, vp.height);
      drawHud(xrGL, view.projectionMatrix);
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Boot check
// ─────────────────────────────────────────────────────────────────────────────
window.addEventListener("load", async () => {
  if (typeof WebTransport === "undefined") {
    log("WebTransport API not found. Use Meta Quest Browser (v50+).");
    document.getElementById("btn-connect").disabled = true;
    return;
  }
  log("WebTransport API available.");

  if (!navigator.xr) {
    log("WebXR not available on this browser.");
    return;
  }
  const arOk = await navigator.xr.isSessionSupported("immersive-ar");
  const vrOk = await navigator.xr.isSessionSupported("immersive-vr");
  log(arOk ? "Passthrough AR supported — ready." :
      vrOk ? "Immersive VR supported (no passthrough on this device)." :
      "No immersive XR mode supported.");
});
</script>
